<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sky's News-o-matic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:#FAFAF8;color:#1a1a1a;font-family:'JetBrains Mono',monospace}
::selection{background:#1a1a1a;color:#FAFAF8}

.header{position:sticky;top:0;z-index:20;background:rgba(250,250,248,0.9);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid #e6e2d8}
.header-inner{max-width:780px;margin:0 auto;padding:18px 24px 14px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px}
.title{font-size:21px;font-weight:800;letter-spacing:-0.01em;line-height:1.05}
.subtitle{font-family:'Newsreader',serif;font-size:14.5px;font-style:italic;color:#6b6760;margin-top:5px}
.meta{flex:none;display:flex;align-items:center;gap:14px;font-size:10.5px;letter-spacing:0.1em;color:#a8a39a;text-transform:uppercase;padding-top:4px}
.meta-sep{color:#d8d3c8}

.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:15px;align-items:center}
.pill{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.04em;padding:5px 12px;border-radius:999px;cursor:pointer;transition:all .12s;border:1px solid #d8d3c8;background:transparent;color:#6b6760}
.pill:hover{border-color:#999}
.pill.on{color:#fff}
.spacer{flex:1}

.sel-bar{display:none;align-items:center;gap:9px}
.sel-bar.show{display:flex}
.sel-count{font-size:10.5px;letter-spacing:0.08em;color:#ff7a00;text-transform:uppercase;font-weight:700}
.copy-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#FAFAF8;background:#ff7a00;border:none;padding:5px 11px;border-radius:3px;cursor:pointer}

main{max-width:780px;margin:0 auto;padding:0 24px}

.sec-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.sec-head h2{margin:0;font-size:12px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase}
.rule{flex:1;height:1px;background:#e6e2d8}

.card{position:relative;background:#fff;border:1px solid #ece9e2;border-radius:2px;padding:18px 22px 20px;margin-bottom:14px;transition:border-color .15s,background .15s}
.card.used{background:#fffaf4;border-color:#ff7a00}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.card-left{min-width:0;flex:1}
.kicker{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase}
.hl{display:inline-block;font-size:18px;font-weight:700;letter-spacing:-0.01em;color:#1a1a1a;line-height:1.22;margin-top:5px;text-decoration:none}
.hl:hover{text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px}
.star{color:#e0a92b}
.src{font-size:10.5px;letter-spacing:0.06em;color:#a8a39a;text-transform:uppercase;margin-top:7px}
.ctrls{flex:none;display:flex;align-items:center;gap:10px;padding-top:2px}
.new{font-size:9px;font-weight:800;letter-spacing:0.12em;color:#fff;background:#1a1a1a;padding:2px 6px;border-radius:3px}
.chk{cursor:pointer;flex:none;display:inline-block;width:20px;height:20px;border-radius:3px;border:1.5px solid #cfcabf;background:#fff;color:#fff;font-size:13px;line-height:17px;text-align:center;font-weight:700;transition:all .12s}
.chk.on{border-color:#ff7a00;background:#ff7a00}
.blurb-en{font-family:'Newsreader',serif;font-size:16px;line-height:1.55;color:#2b2b28;margin:11px 0 0;text-wrap:pretty}
.blurb-zh{font-family:'Newsreader',serif;font-size:14.5px;line-height:1.6;color:#8a857c;margin:7px 0 0;text-wrap:pretty}
.read{display:inline-flex;align-items:center;gap:5px;margin-top:13px;font-size:11px;font-weight:700;letter-spacing:0.04em;color:#1a1a1a;text-decoration:none}
.read:hover{text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px}
.read .arr{color:#b8b2a6}

.arch-toggle{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;padding:0;cursor:pointer;text-align:left;font-family:'JetBrains Mono',monospace}
.arch-toggle h2{margin:0;font-size:12px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:#8a857c}
.arch-n{font-size:10.5px;color:#a8a39a}
.arch-c{font-size:11px;color:#a8a39a}
.arch-list{margin-top:18px;opacity:0.66}

.sug{margin-top:42px;border:1px solid #e6e2d8;border-radius:4px;background:#fff;padding:22px 24px 24px}
.sug-head{display:flex;align-items:center;gap:9px}
.sug-head span{font-size:13px}
.sug-head h2{margin:0;font-size:12px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase}
.sug-desc{font-family:'Newsreader',serif;font-style:italic;font-size:14.5px;color:#6b6760;margin:9px 0 13px}
.sug-ta{width:100%;min-height:88px;resize:vertical;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.5;color:#1a1a1a;background:#FAFAF8;border:1px solid #d8d3c8;border-radius:3px;padding:12px 13px}
.sug-ta:focus{outline:none;border-color:#1a1a1a}
.sug-actions{display:flex;align-items:center;gap:13px;margin-top:12px}
.sug-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#FAFAF8;background:#1a1a1a;border:none;padding:9px 16px;border-radius:3px;cursor:pointer}
.sug-status{font-size:11.5px;color:#a8a39a;font-family:'Newsreader',serif;font-style:italic}

footer{max-width:780px;margin:46px auto 0;padding:20px 24px 0;border-top:1px solid #e6e2d8;text-align:center}
footer div{font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:#b8b2a6}

.empty{font-family:'Newsreader',serif;font-style:italic;color:#a8a39a;padding:24px 0;font-size:15px}
.hidden{display:none}

@media(max-width:600px){
  .header-inner{padding:14px 16px 12px}
  main{padding:0 16px}
  .header-top{flex-direction:column;gap:8px}
  .meta{padding-top:0}
  .title{font-size:18px}
  .card{padding:14px 16px 16px}
  .hl{font-size:16px}
  .sug{padding:16px 18px 18px}
}
</style>
</head>
<body>
<div style="min-height:100vh;padding-bottom:64px">

  <header class="header">
    <div class="header-inner">
      <div class="header-top">
        <div>
          <div class="title">Sky's News-o-matic</div>
          <div class="subtitle">Weekly industry intelligence — Insta360 ICS</div>
        </div>
        <div class="meta">
          <span id="count"></span>
          <span class="meta-sep">/</span>
          <span id="updated"></span>
        </div>
      </div>
      <div class="pills" id="pills"></div>
    </div>
  </header>

  <main>
    <section style="margin-top:34px">
      <div class="sec-head">
        <h2>This Week</h2>
        <div class="rule"></div>
      </div>
      <div id="week"></div>
    </section>

    <section style="margin-top:40px">
      <button class="arch-toggle" id="archToggle">
        <h2>Archive</h2>
        <span class="arch-n" id="archN"></span>
        <span class="arch-c" id="archC">▸</span>
        <div class="rule"></div>
      </button>
      <div id="archList" class="arch-list hidden"></div>
    </section>

    <section class="sug">
      <div class="sug-head">
        <span>→</span>
        <h2>Suggestion Box</h2>
      </div>
      <p class="sug-desc">What should next week's hunt cover? A company, a trend, a technique — drop it here and it lands in our GitHub.</p>
      <textarea id="sugTA" class="sug-ta" placeholder="e.g. Track DJI's pricing response to GoPro, or anamorphic looks faked in post on phones..."></textarea>
      <div class="sug-actions">
        <button class="sug-btn" id="sugBtn">Send to GitHub →</button>
        <span class="sug-status" id="sugStatus"></span>
      </div>
    </section>
  </main>

  <footer>
    <div>Suggestions collected via GitHub Issues · Built for Insta360 ICS</div>
  </footer>

</div>
<script>
(function(){
  var REPO = 'skygidge/SKYS-NEWS-O-MATIC';
  var CATS = {
    visual_trends: {label:'Trends', name:'Emerging Visual Trends', color:'#C0492F'},
    campaigns:     {label:'Campaigns', name:'Interesting Campaigns', color:'#2F6FB0'},
    production:    {label:'Production', name:'Production Techniques', color:'#2A9D5C'},
    creator_study: {label:'Creators', name:'Creator Content Worth Studying', color:'#7A4FB0'}
  };

  var stories = [];
  var active = [];
  var used = {};
  var seen = [];
  var archOpen = false;

  try { used = JSON.parse(localStorage.getItem('sky_used') || '{}') || {}; } catch(e){}
  try { seen = JSON.parse(localStorage.getItem('sky_seen') || '[]') || []; } catch(e){}

  function fmtDate(d) {
    var m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var p = String(d).split('-');
    return m[parseInt(p[1],10)-1] + ' ' + parseInt(p[2],10);
  }

  function isThisWeek(s) {
    var ref = s.date_found || s.added_at;
    if (!ref) return false;
    var d = new Date(ref.length === 10 ? ref + 'T00:00:00Z' : ref);
    var now = new Date();
    return (now - d) < 7 * 24 * 60 * 60 * 1000;
  }

  function passes(s) {
    return active.length === 0 || active.indexOf(s.category) !== -1;
  }

  function pillStyle(on, color) {
    if (on) return 'background:' + color + ';color:#fff;border-color:' + color;
    return '';
  }

  function renderCard(s) {
    var cat = CATS[s.category] || {name:'Other', color:'#888'};
    var isUsed = !!used[s.id];
    var isNew = seen.indexOf(s.id) === -1;
    var borderColor = isUsed ? '#ff7a00' : cat.color;

    var html = '<article class="card' + (isUsed ? ' used' : '') + '" style="border-left:3px solid ' + borderColor + '">';
    html += '<div class="card-top"><div class="card-left">';
    html += '<div class="kicker" style="color:' + cat.color + '">' + esc(cat.name) + '</div>';
    html += '<a class="hl" href="' + esc(s.source_url) + '" target="_blank" rel="noopener">' + esc(s.headline_en);
    if (s.editorial_score >= 8) html += ' <span class="star">★</span>';
    html += '</a>';
    html += '<div class="src">' + esc(s.source_name) + ' · ' + fmtDate(s.article_date) + '</div>';
    html += '</div><div class="ctrls">';
    if (isNew) html += '<span class="new">NEW</span>';
    html += '<span class="chk' + (isUsed ? ' on' : '') + '" data-id="' + esc(s.id) + '">' + (isUsed ? '✓' : '') + '</span>';
    html += '</div></div>';
    html += '<p class="blurb-en">' + esc(s.blurb_en) + '</p>';
    html += '<p class="blurb-zh">' + esc(s.blurb_zh) + '</p>';
    html += '<a class="read" href="' + esc(s.source_url) + '" target="_blank" rel="noopener">Read at ' + esc(s.source_name) + ' <span class="arr">→</span></a>';
    html += '</article>';
    return html;
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    var sorted = stories.slice().sort(function(a,b){
      var da = a.date_found || a.added_at || '';
      var db = b.date_found || b.added_at || '';
      return db.localeCompare(da);
    });

    var week = sorted.filter(function(s){ return isThisWeek(s) && passes(s); });
    var arch = sorted.filter(function(s){ return !isThisWeek(s) && passes(s); });
    var archAll = sorted.filter(function(s){ return !isThisWeek(s); });

    // Count and updated
    document.getElementById('count').textContent = stories.length + ' stories';
    var latest = sorted[0];
    if (latest) {
      var ref = latest.added_at || latest.date_found;
      if (ref) document.getElementById('updated').textContent = 'Updated ' + fmtDate(ref.slice(0,10));
    }

    // Pills
    var ph = '';
    var allOn = active.length === 0;
    ph += '<button class="pill' + (allOn ? ' on' : '') + '" data-cat="all" style="' + pillStyle(allOn, '#1a1a1a') + '">All</button>';
    var slugs = ['visual_trends','campaigns','production','creator_study'];
    for (var i = 0; i < slugs.length; i++) {
      var sl = slugs[i], c = CATS[sl];
      var on = active.indexOf(sl) !== -1;
      ph += '<button class="pill' + (on ? ' on' : '') + '" data-cat="' + sl + '" style="' + pillStyle(on, c.color) + '">' + c.label + '</button>';
    }
    ph += '<div class="spacer"></div>';
    var selIds = stories.filter(function(s){ return used[s.id]; });
    if (selIds.length > 0) {
      ph += '<div class="sel-bar show"><span class="sel-count">' + selIds.length + ' selected</span>';
      ph += '<button class="copy-btn" id="copyBtn">Copy IDs</button></div>';
    }
    document.getElementById('pills').innerHTML = ph;

    // This week
    var wh = '';
    if (week.length === 0) wh = '<div class="empty">No stories this week' + (active.length ? ' in this category' : '') + '.</div>';
    else for (var j = 0; j < week.length; j++) wh += renderCard(week[j]);
    document.getElementById('week').innerHTML = wh;

    // Archive
    document.getElementById('archN').textContent = '(' + archAll.length + ')';
    document.getElementById('archC').textContent = archOpen ? '▾' : '▸';
    var al = document.getElementById('archList');
    if (archOpen) {
      al.classList.remove('hidden');
      var ah = '';
      if (arch.length === 0) ah = '<div class="empty">No archived stories' + (active.length ? ' in this category' : '') + '.</div>';
      else for (var k = 0; k < arch.length; k++) ah += renderCard(arch[k]);
      al.innerHTML = ah;
    } else {
      al.classList.add('hidden');
    }
  }

  // Event delegation
  document.addEventListener('click', function(e) {
    var t = e.target;

    // Pills
    if (t.classList.contains('pill')) {
      var cat = t.getAttribute('data-cat');
      if (cat === 'all') active = [];
      else {
        var idx = active.indexOf(cat);
        if (idx !== -1) active.splice(idx, 1);
        else active.push(cat);
      }
      render();
      return;
    }

    // Checkboxes
    if (t.classList.contains('chk')) {
      var id = t.getAttribute('data-id');
      if (used[id]) delete used[id];
      else used[id] = true;
      try { localStorage.setItem('sky_used', JSON.stringify(used)); } catch(e){}
      render();
      return;
    }

    // Copy IDs
    if (t.id === 'copyBtn' || (t.parentElement && t.parentElement.id === 'copyBtn')) {
      var ids = stories.filter(function(s){ return used[s.id]; }).map(function(s){ return s.id; });
      try { navigator.clipboard.writeText(ids.join('\n')); } catch(e){}
      var btn = document.getElementById('copyBtn');
      if (btn) { btn.textContent = 'Copied'; setTimeout(function(){ btn.textContent = 'Copy IDs'; }, 1600); }
      return;
    }

    // Archive toggle
    var at = document.getElementById('archToggle');
    if (at && at.contains(t)) {
      archOpen = !archOpen;
      render();
      return;
    }
  });

  // Suggestion box
  document.getElementById('sugBtn').addEventListener('click', function() {
    var ta = document.getElementById('sugTA');
    var txt = (ta.value || '').trim();
    if (!txt) {
      document.getElementById('sugStatus').textContent = 'Type a suggestion first.';
      return;
    }
    var url = 'https://github.com/' + REPO + '/issues/new?labels=topic-suggestion&title=' +
      encodeURIComponent('[Suggestion] ' + txt.slice(0,60)) + '&body=' + encodeURIComponent(txt);
    window.open(url, '_blank', 'noopener');
    ta.value = '';
    document.getElementById('sugStatus').textContent = 'Opened a prefilled GitHub issue — submit it there →';
  });

  // Fetch data and render
  fetch('all_stories.json')
    .then(function(r){ return r.ok ? r.json() : []; })
    .then(function(data){
      stories = Array.isArray(data) ? data : [];
      // Mark all current as seen, track new
      var ids = stories.map(function(s){ return s.id; });
      try { localStorage.setItem('sky_seen', JSON.stringify(ids)); } catch(e){}
      // seen stays as the PREVIOUS visit's list for NEW badge calculation
      render();
    })
    .catch(function(){
      document.getElementById('week').innerHTML = '<div class="empty">Could not load stories.</div>';
    });
})();
</script>
</body>
</html>
